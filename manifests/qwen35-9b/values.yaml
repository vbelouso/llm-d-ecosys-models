modelArtifacts:
  uri: "pvc://qwen35-9b-pvc/hub/Qwen/Qwen3.5-9B"
  name: "Qwen/Qwen3.5-9B"
  size: 25Gi
  authSecretName: "llm-d-hf-token"
  labels:
    app: "vllm-qwen35-9b" # Must match inferencePool.modelServers.matchLabels.app

routing:
  servicePort: 8000

accelerator:
  type: nvidia

decode:
  containers:
    - name: "vllm"
      image: "vllm/vllm-openai:v0.17.0"
      modelCommand: vllmServe
      args:
        - "--enable-auto-tool-choice"
        - "--tool-call-parser"
        - "hermes"
        - "--disable-access-log-for-endpoints"
        - "/health,/metrics,/ping"
      env:
        - name: HOME
          value: /tmp
      mountModelVolume: true

prefill:
  create: false
